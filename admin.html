<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin · BUILDER VENTURE STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#F5F5F7;color:#1D1D1F;min-height:100vh;}
        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
        .login-box{background:white;border-radius:2rem;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.08);}
        .admin-wrap{max-width:900px;margin:0 auto;padding:1.5rem;}
        .card{background:white;border-radius:1.5rem;padding:1.5rem;margin-bottom:1.5rem;border:1px solid rgba(0,0,0,0.08);}
        .card-title{font-size:1rem;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.85rem;}
        .field{display:flex;flex-direction:column;gap:.35rem;}
        .field label{font-size:.78rem;font-weight:600;color:#6E6E73;}
        .field input,.field select,.field textarea{background:#F5F5F7;border:1px solid rgba(0,0,0,0.1);border-radius:.75rem;padding:.6rem .9rem;font-size:.875rem;color:#1D1D1F;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;width:100%;}
        .field input:focus,.field select:focus,.field textarea:focus{border-color:#0071E3;background:white;}
        .field textarea{resize:vertical;min-height:80px;}
        .full{grid-column:1/-1;}
        .btn{padding:.65rem 1.25rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem;}
        .btn-blue{background:#0071E3;color:white;}.btn-blue:hover{background:#0077ED;}
        .btn-gray{background:#F5F5F7;color:#1D1D1F;border:1px solid rgba(0,0,0,0.1);}.btn-gray:hover{background:#e5e5e5;}
        .btn-red{background:#FEF2F2;color:#DC2626;}.btn-red:hover{background:#DC2626;color:white;}
        .btn-green{background:#F0FDF4;color:#16A34A;}.btn-green:hover{background:#16A34A;color:white;}
        .proj-item{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1rem;border-radius:1rem;border:1px solid rgba(0,0,0,0.08);margin-bottom:.5rem;gap:.75rem;flex-wrap:wrap;}
        .proj-item:hover{background:#F5F5F7;}
        .proj-info{display:flex;align-items:center;gap:.75rem;flex:1;min-width:0;}
        .proj-logo{width:40px;height:40px;border-radius:.75rem;object-fit:contain;background:#F5F5F7;flex-shrink:0;}
        .proj-logo-placeholder{width:40px;height:40px;border-radius:.75rem;background:#e5e7eb;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:.7rem;flex-shrink:0;}
        .proj-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .proj-meta{font-size:.75rem;color:#6E6E73;}
        .badge{font-size:.68rem;font-weight:600;padding:.2rem .6rem;border-radius:100px;display:inline-block;}
        .badge-inv{background:#EFF6FF;color:#1D4ED8;}
        .badge-team{background:#F0FDF4;color:#166534;}
        .badge-both{background:#FEF3C7;color:#92400E;}
        .badge-stage{background:#F5F5F7;color:#6E6E73;}
        .tab-bar{display:flex;gap:.5rem;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:.25rem;}
        .tab{padding:.5rem 1rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:#F5F5F7;color:#6E6E73;white-space:nowrap;transition:all .2s;}
        .tab.active{background:#0071E3;color:white;}
        .post-item{padding:.85rem 1rem;border-radius:1rem;border:1px solid rgba(0,0,0,0.08);margin-bottom:.5rem;}
        .post-item:hover{background:#F5F5F7;}
        .post-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;flex-wrap:wrap;}
        .post-name{font-weight:600;font-size:.9rem;}
        .post-meta{font-size:.78rem;color:#6E6E73;margin-top:.2rem;}
        .post-msg{font-size:.82rem;color:#374151;margin-top:.5rem;line-height:1.5;}
        .post-actions{display:flex;gap:.4rem;margin-top:.75rem;flex-wrap:wrap;}
        .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem;}
        .dot-pending{background:#F59E0B;}
        .dot-accepted{background:#10B981;}
        .dot-rejected{background:#EF4444;}
        .dot-interview{background:#8B5CF6;}
        .section-hidden{display:none;}
        .logo-preview-img{width:60px;height:60px;object-fit:contain;border-radius:.75rem;background:#F5F5F7;padding:4px;border:1px solid rgba(0,0,0,0.08);}
        .divider{height:1px;background:rgba(0,0,0,0.06);margin:1rem 0;}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
    <div class="login-box">
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.75rem;">
            <div style="width:40px;height:40px;border-radius:12px;background:#0071E3;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 17 L6 7 L12 7 Q16 7 16 11 Q16 15 12 15 L6 15" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div>
                <div style="font-weight:700;font-size:1rem;">BUILDER VENTURE STUDIO</div>
                <div style="font-size:.75rem;color:#6E6E73;">Panel de Administración</div>
            </div>
        </div>
        <div class="field" style="margin-bottom:1rem;">
            <label>Contraseña</label>
            <input type="password" id="passInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button class="btn btn-blue" style="width:100%;justify-content:center;" onclick="login()"><i class="fas fa-lock"></i> Ingresar</button>
        <div id="loginError" style="color:#DC2626;font-size:.8rem;margin-top:.75rem;display:none;">Contraseña incorrecta</div>
    </div>
</div>

<!-- ADMIN -->
<div id="adminWrap" style="display:none;">
    <div style="background:white;border-bottom:1px solid rgba(0,0,0,0.08);padding:1rem 1.5rem;position:sticky;top:0;z-index:10;">
        <div style="max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
            <div style="font-weight:700;font-size:.95rem;">🏗️ Builder Admin</div>
            <div style="display:flex;gap:.5rem;">
                <button class="btn btn-gray" onclick="exportarDatos()"><i class="fas fa-download"></i> Exportar</button>
                <button class="btn btn-gray" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <div class="admin-wrap">
        <!-- TABS -->
        <div class="tab-bar">
            <button class="tab active" onclick="showTab('proyectos')">📁 Proyectos</button>
            <button class="tab" onclick="showTab('postulaciones')">📬 Postulaciones</button>
        </div>

        <!-- TAB PROYECTOS -->
        <div id="tabProyectos">
            <!-- FORM -->
            <div class="card">
                <div class="card-title"><i class="fas fa-plus-circle" style="color:#0071E3;"></i> <span id="formTitle">Nuevo proyecto</span></div>
                <input type="hidden" id="projId">

                <div class="form-grid">
                    <!-- ES -->
                    <div class="field">
                        <label>Nombre (ES)</label>
                        <input type="text" id="projNombre" placeholder="Nombre del proyecto">
                    </div>
                    <div class="field">
                        <label>Descripción corta (ES)</label>
                        <input type="text" id="projDesc" placeholder="Descripción breve">
                    </div>
                    <div class="field">
                        <label>Estado (ES)</label>
                        <select id="projEstado">
                            <option value="Pre Seed">Pre Seed</option>
                            <option value="Seed">Seed</option>
                            <option value="MVP">MVP</option>
                            <option value="En desarrollo">En desarrollo</option>
                            <option value="Buscando equipo">Buscando equipo</option>
                            <option value="Buscando inversión">Buscando inversión</option>
                            <option value="Proyecto Finalizado">Proyecto Finalizado</option>
                        </select>
                    </div>
                    <!-- EN -->
                    <div class="field">
                        <label>Nombre (EN)</label>
                        <input type="text" id="projNombreEn" placeholder="Project name in English">
                    </div>
                    <div class="field">
                        <label>Descripción (EN)</label>
                        <input type="text" id="projDescEn" placeholder="Short description in English">
                    </div>
                    <div class="field">
                        <label>Estado (EN)</label>
                        <select id="projEstadoEn">
                            <option value="Pre Seed">Pre Seed</option>
                            <option value="Seed">Seed</option>
                            <option value="MVP">MVP</option>
                            <option value="In Development">In Development</option>
                            <option value="Seeking Team">Seeking Team</option>
                            <option value="Seeking Investment">Seeking Investment</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="divider full"></div>

                    <!-- NECESIDADES -->
                    <div class="field">
                        <label>¿Qué necesita este proyecto?</label>
                        <select id="projNecesidad">
                            <option value="">— No especificado —</option>
                            <option value="inversion">💰 Busca Inversión</option>
                            <option value="equipo">👥 Busca Equipo</option>
                            <option value="ambos">🚀 Inversión + Equipo</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Monto buscado (ej: $25.000 USD)</label>
                        <input type="text" id="projMonto" placeholder="$25.000 USD · Pre-seed round">
                    </div>
                    <div class="field full">
                        <label>Rol/es buscados (ej: CTO · Lead Developer)</label>
                        <input type="text" id="projRol" placeholder="CTO · Lead Developer · CMO">
                    </div>
                    <div class="field full">
                        <label>Tracción actual (ej: 120 usuarios · $500 MRR)</label>
                        <input type="text" id="projTraccion" placeholder="120 usuarios registrados · $500 MRR · 3 pilotos activos">
                    </div>

                    <div class="divider full"></div>

                    <!-- LOGO -->
                    <div class="field full">
                        <label>Logo / Imagen preview</label>
                        <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
                            <input type="file" id="logoInput" accept="image/*" style="flex:1;min-width:200px;">
                            <button class="btn btn-gray" type="button" onclick="cargarLogo()"><i class="fas fa-upload"></i> Cargar</button>
                            <div id="logoPreview" style="display:none;"><img id="logoPreviewImg" class="logo-preview-img" src="" alt=""></div>
                        </div>
                        <input type="hidden" id="projLogo">
                    </div>

                    <!-- HTML -->
                    <div class="field full">
                        <label>Archivo HTML del proyecto</label>
                        <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
                            <input type="file" id="htmlInput" accept=".html" style="flex:1;min-width:200px;">
                            <button class="btn btn-gray" type="button" onclick="cargarHTML()"><i class="fas fa-code"></i> Cargar HTML</button>
                        </div>
                    </div>
                    <div class="field full">
                        <label>Código HTML (o pegalo aquí)</label>
                        <textarea id="projHtml" rows="5" placeholder="Pegá el código HTML aquí..."></textarea>
                    </div>

                    <div class="field" style="align-items:flex-start;">
                        <label>Visibilidad</label>
                        <label style="display:flex;align-items:center;gap:.5rem;font-size:.875rem;font-weight:400;cursor:pointer;">
                            <input type="checkbox" id="projActivo" checked> Activo en la landing
                        </label>
                    </div>
                </div>

                <div style="display:flex;gap:.65rem;margin-top:1.25rem;flex-wrap:wrap;">
                    <button class="btn btn-blue" onclick="guardarProyecto()"><i class="fas fa-save"></i> Guardar proyecto</button>
                    <button class="btn btn-gray" onclick="limpiarForm()"><i class="fas fa-eraser"></i> Cancelar</button>
                </div>
            </div>

            <!-- LISTA -->
            <div class="card">
                <div class="card-title"><i class="fas fa-folder-open" style="color:#0071E3;"></i> Proyectos existentes</div>
                <div id="projLista"><div style="text-align:center;color:#9ca3af;padding:2rem;">Cargando...</div></div>
            </div>
        </div>

        <!-- TAB POSTULACIONES -->
        <div id="tabPostulaciones" class="section-hidden">
            <div class="card">
                <div class="card-title"><i class="fas fa-inbox" style="color:#0071E3;"></i> Postulaciones recibidas</div>
                <div id="postLista"><div style="text-align:center;color:#9ca3af;padding:2rem;">Cargando...</div></div>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL='https://hniumqxaqfjvumimwtyp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuaXVtcXhhcWZqdnVtaW13dHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTc2MjAsImV4cCI6MjA5NTU5MzYyMH0.JC7Hscdy7lpiMIaDD02vteh5aw9GDdEPCzmzBvUMs9Q';
let proyectos=[];
let postulaciones=[];

function login(){
    const p=document.getElementById('passInput').value;
    if(p==='builder2026'){
        document.getElementById('loginWrap').style.display='none';
        document.getElementById('adminWrap').style.display='block';
        cargarProyectos();
        cargarPostulaciones();
    } else {
        document.getElementById('loginError').style.display='block';
    }
}
function logout(){window.location.reload();}

function showTab(tab){
    document.getElementById('tabProyectos').classList.toggle('section-hidden',tab!=='proyectos');
    document.getElementById('tabPostulaciones').classList.toggle('section-hidden',tab!=='postulaciones');
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='proyectos'&&i===0)||(tab==='postulaciones'&&i===1)));
}

async function cargarProyectos(){
    const res=await fetch(`${SUPABASE_URL}/rest/v1/proyectos?order=created_at.desc`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    proyectos=await res.json();
    renderLista();
}

function getNecesidadBadge(tipo){
    const map={inversion:'<span class="badge badge-inv">💰 Inversión</span>',equipo:'<span class="badge badge-team">👥 Equipo</span>',ambos:'<span class="badge badge-both">🚀 Ambos</span>'};
    return map[tipo]||'';
}

function renderLista(){
    const el=document.getElementById('projLista');
    if(!proyectos.length){el.innerHTML='<div style="text-align:center;color:#9ca3af;padding:2rem;">Sin proyectos. Creá el primero arriba.</div>';return;}
    el.innerHTML=proyectos.map(p=>`
        <div class="proj-item">
            <div class="proj-info">
                ${p.logo_data?`<img src="${p.logo_data}" class="proj-logo">`:`<div class="proj-logo-placeholder"><i class="fas fa-image"></i></div>`}
                <div style="min-width:0;">
                    <div class="proj-name">${escHtml(p.nombre)}</div>
                    <div class="proj-meta" style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.2rem;">
                        <span class="badge badge-stage">${escHtml(p.estado||'')}</span>
                        ${getNecesidadBadge(p.tipo_necesidad)}
                        ${p.traccion?`<span style="font-size:.7rem;color:#6E6E73;">📊 ${escHtml(p.traccion)}</span>`:''}
                        <span style="font-size:.7rem;color:${p.activo?'#16A34A':'#DC2626'};">${p.activo?'● Activo':'● Inactivo'}</span>
                    </div>
                </div>
            </div>
            <div style="display:flex;gap:.4rem;">
                <button class="btn btn-gray" onclick="editarProyecto(${p.id})" style="padding:.4rem .7rem;font-size:.8rem;"><i class="fas fa-pen"></i></button>
                <button class="btn btn-red" onclick="eliminarProyecto(${p.id})" style="padding:.4rem .7rem;font-size:.8rem;"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function editarProyecto(id){
    const p=proyectos.find(x=>x.id==id);
    if(!p) return;
    document.getElementById('projId').value=p.id;
    document.getElementById('projNombre').value=p.nombre||'';
    document.getElementById('projDesc').value=p.descripcion||'';
    document.getElementById('projEstado').value=p.estado||'Pre Seed';
    document.getElementById('projNombreEn').value=p.nombre_en||'';
    document.getElementById('projDescEn').value=p.descripcion_en||'';
    document.getElementById('projEstadoEn').value=p.estado_en||'Pre Seed';
    document.getElementById('projNecesidad').value=p.tipo_necesidad||'';
    document.getElementById('projMonto').value=p.monto_busqueda||'';
    document.getElementById('projRol').value=p.rol_buscado||'';
    document.getElementById('projTraccion').value=p.traccion||'';
    document.getElementById('projActivo').checked=p.activo;
    document.getElementById('projHtml').value=p.html_content||'';
    document.getElementById('projLogo').value=p.logo_data||'';
    if(p.logo_data){
        document.getElementById('logoPreviewImg').src=p.logo_data;
        document.getElementById('logoPreview').style.display='block';
    } else {
        document.getElementById('logoPreview').style.display='none';
    }
    document.getElementById('formTitle').textContent='Editar proyecto';
    window.scrollTo({top:0,behavior:'smooth'});
}

async function guardarProyecto(){
    const id=document.getElementById('projId').value;
    const payload={
        nombre:document.getElementById('projNombre').value.trim(),
        descripcion:document.getElementById('projDesc').value.trim(),
        estado:document.getElementById('projEstado').value,
        nombre_en:document.getElementById('projNombreEn').value.trim(),
        descripcion_en:document.getElementById('projDescEn').value.trim(),
        estado_en:document.getElementById('projEstadoEn').value,
        tipo_necesidad:document.getElementById('projNecesidad').value||null,
        monto_busqueda:document.getElementById('projMonto').value.trim()||null,
        rol_buscado:document.getElementById('projRol').value.trim()||null,
        traccion:document.getElementById('projTraccion').value.trim()||null,
        activo:document.getElementById('projActivo').checked,
        logo_data:document.getElementById('projLogo').value||null,
        html_content:document.getElementById('projHtml').value.trim()||null,
        updated_at:new Date().toISOString()
    };
    if(!payload.nombre){alert('El nombre es obligatorio');return;}
    const url=id?`${SUPABASE_URL}/rest/v1/proyectos?id=eq.${id}`:`${SUPABASE_URL}/rest/v1/proyectos`;
    const method=id?'PATCH':'POST';
    const res=await fetch(url,{
        method,
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify(payload)
    });
    if(res.ok||res.status===201||res.status===204){
        alert('✅ Proyecto guardado');
        limpiarForm();
        cargarProyectos();
    } else {
        const err=await res.text();
        alert('Error: '+err);
    }
}

async function eliminarProyecto(id){
    if(!confirm('¿Eliminar este proyecto?')) return;
    const res=await fetch(`${SUPABASE_URL}/rest/v1/proyectos?id=eq.${id}`,{
        method:'DELETE',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    if(res.ok||res.status===204){cargarProyectos();}
    else alert('Error al eliminar');
}

function limpiarForm(){
    ['projId','projNombre','projDesc','projNombreEn','projDescEn','projMonto','projRol','projTraccion','projHtml','projLogo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('projEstado').value='Pre Seed';
    document.getElementById('projEstadoEn').value='Pre Seed';
    document.getElementById('projNecesidad').value='';
    document.getElementById('projActivo').checked=true;
    document.getElementById('logoPreview').style.display='none';
    document.getElementById('logoPreviewImg').src='';
    document.getElementById('logoInput').value='';
    document.getElementById('htmlInput').value='';
    document.getElementById('formTitle').textContent='Nuevo proyecto';
}

function cargarLogo(){
    const file=document.getElementById('logoInput').files[0];
    if(!file){alert('Seleccioná una imagen');return;}
    const reader=new FileReader();
    reader.onload=e=>{
        document.getElementById('projLogo').value=e.target.result;
        document.getElementById('logoPreviewImg').src=e.target.result;
        document.getElementById('logoPreview').style.display='block';
    };
    reader.readAsDataURL(file);
}

function cargarHTML(){
    const file=document.getElementById('htmlInput').files[0];
    if(!file){alert('Seleccioná un archivo .html');return;}
    const reader=new FileReader();
    reader.onload=e=>{document.getElementById('projHtml').value=e.target.result;};
    reader.readAsText(file,'UTF-8');
}

// POSTULACIONES
async function cargarPostulaciones(){
    const res=await fetch(`${SUPABASE_URL}/rest/v1/postulaciones?order=created_at.desc`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    postulaciones=await res.json();
    renderPostulaciones();
}

function renderPostulaciones(){
    const el=document.getElementById('postLista');
    if(!postulaciones.length){el.innerHTML='<div style="text-align:center;color:#9ca3af;padding:2rem;">Sin postulaciones aún.</div>';return;}
    const estadoMap={pendiente:{label:'Pendiente',dot:'dot-pending'},entrevista:{label:'En entrevista',dot:'dot-interview'},aceptado:{label:'Aceptado',dot:'dot-accepted'},rechazado:{label:'Rechazado',dot:'dot-rejected'}};
    el.innerHTML=postulaciones.map(p=>{
        const proj=proyectos.find(x=>x.id==p.proyecto_id);
        const est=estadoMap[p.estado]||{label:p.estado,dot:'dot-pending'};
        return `
        <div class="post-item">
            <div class="post-header">
                <div>
                    <div class="post-name">${escHtml(p.nombre)}</div>
                    <div class="post-meta">
                        <span class="status-dot ${est.dot}"></span>${est.label} · 
                        ${p.perfil||'Sin perfil'} · 
                        ${proj?`Proyecto: ${proj.nombre}`:'Cualquier proyecto'} · 
                        ${new Date(p.created_at).toLocaleDateString('es-AR')}
                    </div>
                    ${p.portfolio?`<div style="font-size:.78rem;margin-top:.2rem;"><a href="${escHtml(p.portfolio)}" target="_blank" style="color:#0071E3;">${escHtml(p.portfolio)}</a></div>`:''}
                </div>
                <a href="mailto:${escHtml(p.email)}" style="font-size:.8rem;color:#0071E3;text-decoration:none;white-space:nowrap;"><i class="fas fa-envelope"></i> ${escHtml(p.email)}</a>
            </div>
            ${p.mensaje?`<div class="post-msg">${escHtml(p.mensaje)}</div>`:''}
            <div class="post-actions">
                <button class="btn btn-green" style="padding:.35rem .75rem;font-size:.75rem;" onclick="cambiarEstadoPost(${p.id},'aceptado')"><i class="fas fa-check"></i> Aceptar</button>
                <button class="btn btn-gray" style="padding:.35rem .75rem;font-size:.75rem;" onclick="cambiarEstadoPost(${p.id},'entrevista')"><i class="fas fa-calendar"></i> Entrevistar</button>
                <button class="btn btn-red" style="padding:.35rem .75rem;font-size:.75rem;" onclick="cambiarEstadoPost(${p.id},'rechazado')"><i class="fas fa-times"></i> Rechazar</button>
            </div>
        </div>`;
    }).join('');
}

async function cambiarEstadoPost(id,estado){
    const res=await fetch(`${SUPABASE_URL}/rest/v1/postulaciones?id=eq.${id}`,{
        method:'PATCH',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({estado})
    });
    if(res.ok||res.status===204) cargarPostulaciones();
}

async function exportarDatos(){
    const data={proyectos,postulaciones,exportado:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`bvs_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function escHtml(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
</script>
